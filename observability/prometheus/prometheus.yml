global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yaml

scrape_configs:
  - job_name: triton
    static_configs:
      - targets: ["triton:8002"]

  - job_name: services
    metrics_path: /metrics
    static_configs:
      - targets:
          - "ingest:9100"
          - "detector:9100"
          - "face:9100"
          - "fusion:9100"
          - "alerts:9100"
          - "evidence:9100"
          - "api:9100"

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: dcgm-exporter
    static_configs:
      - targets: ["dcgm-exporter:9400"]
